<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | FileOrganiser</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css" id="dark-mode-style" disabled>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Dashboard Specific Styles */
        .dashboard-container {
            display: flex;
            min-height: 100vh;
            background: #f8fafc;
        }

        .sidebar {
            width: 280px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 30px;
            border-bottom: 1px solid #e5e7eb;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-logo i {
            font-size: 2rem;
            color: #4f46e5;
        }

        .sidebar-logo h2 {
            font-size: 1.5rem;
            color: #1e293b;
            font-weight: 700;
        }

        .user-info {
            padding: 20px 30px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
        }

        .user-details h4 {
            color: #1e293b;
            margin-bottom: 5px;
            font-size: 1rem;
        }

        .user-details p {
            color: #64748b;
            font-size: 0.85rem;
        }

        .nav-menu {
            flex: 1;
            padding: 30px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            color: #64748b;
            border-radius: 10px;
            margin-bottom: 5px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .nav-item:hover {
            background: #f1f5f9;
            color: #1e293b;
        }

        .nav-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .nav-item i {
            width: 20px;
            text-align: center;
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
        }

        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header-title h1 {
            font-size: 2rem;
            color: #1e293b;
            margin-bottom: 5px;
        }

        .header-title p {
            color: #64748b;
        }

        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .search-box {
            position: relative;
            width: 300px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 45px 12px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 25px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .search-box button {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #64748b;
            padding: 10px;
            cursor: pointer;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4f46e5;
            font-size: 1.8rem;
        }

        .stat-info h3 {
            font-size: 2rem;
            color: #1e293b;
            margin-bottom: 5px;
        }

        .stat-info p {
            color: #64748b;
            font-size: 0.9rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .dashboard-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-header h3 {
            color: #1e293b;
            font-size: 1.2rem;
        }

        .card-header .btn-link {
            color: #4f46e5;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .recent-file {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #f1f5f9;
            transition: all 0.3s ease;
        }

        .recent-file:hover {
            background: #f8fafc;
        }

        .recent-file .file-icon {
            width: 40px;
            height: 40px;
            background: #fee2e2;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ef4444;
            margin-right: 15px;
        }

        .recent-file .file-info {
            flex: 1;
        }

        .recent-file .file-info h4 {
            color: #1e293b;
            font-size: 0.95rem;
            margin-bottom: 5px;
        }

        .recent-file .file-meta {
            display: flex;
            gap: 15px;
            font-size: 0.8rem;
            color: #64748b;
        }

        .file-number {
            color: #4f46e5;
            font-weight: 600;
        }

        .file-actions {
            display: flex;
            gap: 10px;
        }

        .btn-icon {
            width: 35px;
            height: 35px;
            border: none;
            border-radius: 8px;
            background: #f1f5f9;
            color: #64748b;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-icon:hover {
            background: #e2e8f0;
            color: #1e293b;
        }

        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .file-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .file-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .file-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .file-header .file-icon {
            width: 50px;
            height: 50px;
            background: #fee2e2;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ef4444;
            font-size: 1.5rem;
        }

        .file-title {
            flex: 1;
        }

        .file-title h4 {
            color: #1e293b;
            font-size: 1rem;
            margin-bottom: 5px;
        }

        .file-tags {
            display: flex;
            gap: 8px;
        }

        .tag {
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .tag-number {
            background: #e0f2fe;
            color: #0284c7;
        }

        .tag-category {
            background: #fef3c7;
            color: #b45309;
        }

        .tag-status {
            background: #d1fae5;
            color: #059669;
        }

        .file-body {
            margin-bottom: 20px;
        }

        .file-description {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .file-meta {
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
            color: #64748b;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .file-actions .btn {
            flex: 1;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            color: #cbd5e1;
        }

        .empty-state p {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .empty-subtext {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .btn-sm {
            padding: 8px 15px;
            font-size: 0.85rem;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        /* Dark mode adjustments */
        body.dark-mode .dashboard-container {
            background: #0f172a;
        }

        body.dark-mode .sidebar {
            background: #1e293b;
        }

        body.dark-mode .sidebar-logo h2 {
            color: #f1f5f9;
        }

        body.dark-mode .user-details h4 {
            color: #f1f5f9;
        }

        body.dark-mode .nav-item {
            color: #94a3b8;
        }

        body.dark-mode .nav-item:hover {
            background: #334155;
            color: #f1f5f9;
        }

        body.dark-mode .stat-card,
        body.dark-mode .dashboard-card,
        body.dark-mode .file-card {
            background: #1e293b;
        }

        body.dark-mode .stat-info h3,
        body.dark-mode .card-header h3,
        body.dark-mode .file-title h4 {
            color: #f1f5f9;
        }

        body.dark-mode .search-box input {
            background: #334155;
            border-color: #475569;
            color: #f1f5f9;
        }

        body.dark-mode .btn-secondary {
            background: #334155;
            color: #f1f5f9;
        }

        @media (max-width: 1200px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            .main-content {
                margin-left: 0;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <i class="fas fa-folder-tree"></i>
                    <h2>FileOrganiser</h2>
                </div>
            </div>
            
            <div class="user-info">
                <div class="user-avatar">
                    <i class="fas fa-user-cog"></i>
                </div>
                <div class="user-details">
                    <h4 id="userName">Admin User</h4>
                    <p id="userEmail">admin@company.com</p>
                </div>
            </div>
            
            <div class="nav-menu">
                <div class="nav-item active" data-view="dashboard">
                    <i class="fas fa-chart-pie"></i>
                    <span>Dashboard</span>
                </div>
                <div class="nav-item" data-view="files">
                    <i class="fas fa-files"></i>
                    <span>All Files</span>
                </div>
                <div class="nav-item" id="uploadBtn">
                    <i class="fas fa-upload"></i>
                    <span>Upload Files</span>
                </div>
                <div class="nav-item" id="auditLogsBtn">
                    <i class="fas fa-history"></i>
                    <span>Audit Logs</span>
                </div>
                <div class="nav-item" id="settingsBtn">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </div>
                <div class="nav-item" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </div>
            </div>
            
            <div style="padding: 30px;">
                <button class="theme-toggle" id="themeToggle" style="width: 100%; background: #f1f5f9; color: #1e293b;">
                    <i class="fas fa-moon"></i>
                    Dark Mode
                </button>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <div class="main-header">
                <div class="header-title">
                    <h1>Dashboard</h1>
                    <p>Welcome back! Here's what's happening with your documents.</p>
                </div>
                <div class="header-actions">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Search files by name, number, or category...">
                        <button id="searchBtn">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                    <button class="btn btn-primary" id="refreshBtn">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </div>
            
            <!-- Stats Grid -->
            <div class="stats-grid" id="statsContainer">
                <!-- Stats will be loaded dynamically -->
            </div>
            
            <!-- Dashboard View -->
            <div id="dashboardView">
                <div class="dashboard-grid">
                    <!-- Recent Files -->
                    <div class="dashboard-card">
                        <div class="card-header">
                            <h3><i class="fas fa-clock"></i> Recent Files</h3>
                            <a href="#" class="btn-link" data-view="files">View All</a>
                        </div>
                        <div id="recentFiles">
                            <!-- Recent files will be loaded dynamically -->
                        </div>
                    </div>
                    
                    <!-- Category Distribution -->
                    <div class="dashboard-card">
                        <div class="card-header">
                            <h3><i class="fas fa-chart-bar"></i> Category Distribution</h3>
                            <span class="btn-link" id="refreshCategories">
                                <i class="fas fa-redo-alt"></i>
                            </span>
                        </div>
                        <div id="categoryStats" style="padding: 20px;">
                            <!-- Category stats will be loaded dynamically -->
                        </div>
                    </div>
                </div>
                
                <!-- Filter Bar -->
                <div style="display: flex; justify-content: space-between; align-items: center; margin: 30px 0 20px;">
                    <h3><i class="fas fa-file-pdf"></i> All Files</h3>
                    <div style="display: flex; gap: 15px;">
                        <select id="categoryFilter" class="form-select" style="padding: 10px 20px; border-radius: 8px; border: 2px solid #e5e7eb;">
                            <option value="">All Categories</option>
                        </select>
                        <select id="statusFilter" class="form-select" style="padding: 10px 20px; border-radius: 8px; border: 2px solid #e5e7eb;">
                            <option value="Active">Active</option>
                            <option value="Archived">Archived</option>
                            <option value="Deleted">Deleted</option>
                        </select>
                    </div>
                </div>
                
                <!-- Files Grid -->
                <div id="filesContainer" class="files-grid">
                    <!-- Files will be loaded dynamically -->
                </div>
                
                <!-- Pagination -->
                <div class="pagination">
                    <button class="btn btn-secondary" id="prevPage">
                        <i class="fas fa-chevron-left"></i>
                        Previous
                    </button>
                    <span id="pageInfo">Page 1 of 1</span>
                    <button class="btn btn-secondary" id="nextPage">
                        Next
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>
            
            <!-- Files View (hidden by default) -->
            <div id="filesView" style="display: none;">
                <h2 style="margin-bottom: 20px;">All Files</h2>
                <div id="allFilesContainer" class="files-grid">
                    <!-- All files will be loaded dynamically -->
                </div>
                <div class="pagination" id="allFilesPagination">
                    <!-- Pagination for all files -->
                </div>
            </div>
        </main>
    </div>

    <script src="js/util.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin-dashboard.js"></script>
    <script>
    (async function() {
        // Wait for authManager to initialize
        await authManager.checkSession();
        if (!authManager.isAuthenticated()) {
            window.location.href = 'login.html';
            return;
        }
        // Role-specific check
        if (window.location.pathname.includes('admin') && !authManager.isAdmin()) {
            window.location.href = 'reader-dashboard.html';
        } else if (window.location.pathname.includes('reader') && authManager.isAdmin()) {
            window.location.href = 'admin-dashboard.html';
        }
    })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload File | FileOrganiser</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css" id="dark-mode-style" disabled>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .upload-container {
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .upload-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .upload-header .back-btn {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: white;
            border: 2px solid #e5e7eb;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-header .back-btn:hover {
            background: #f1f5f9;
            color: #1e293b;
        }

        .upload-header h1 {
            font-size: 2rem;
            color: #1e293b;
            margin: 0;
        }

        .upload-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .upload-area {
            border: 3px dashed #e5e7eb;
            border-radius: 15px;
            padding: 50px;
            text-align: center;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-area:hover,
        .upload-area.dragover {
            border-color: #4f46e5;
            background: linear-gradient(135deg, #667eea05 0%, #764ba205 100%);
        }

        .upload-area i {
            font-size: 4rem;
            color: #4f46e5;
            margin-bottom: 20px;
        }

        .upload-area h3 {
            color: #1e293b;
            margin-bottom: 10px;
        }

        .upload-area p {
            color: #64748b;
            margin-bottom: 5px;
        }

        .upload-area .file-info {
            margin-top: 20px;
            padding: 15px;
            background: #f8fafc;
            border-radius: 10px;
            display: none;
        }

        .upload-area.has-file {
            border-color: #4f46e5;
            background: linear-gradient(135deg, #667eea05 0%, #764ba205 100%);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #1e293b;
        }

        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .file-number-preview {
            background: #f8fafc;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .file-number-preview h4 {
            color: #1e293b;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .preview-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .preview-item:last-child {
            border-bottom: none;
        }

        .preview-label {
            color: #64748b;
            font-weight: 500;
        }

        .preview-value {
            font-weight: 600;
            color: #4f46e5;
            font-size: 1.1rem;
        }

        .upload-progress {
            margin: 30px 0;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            margin-top: 10px;
            color: #64748b;
        }

        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .form-actions .btn {
            flex: 1;
            padding: 15px;
        }

        .next-numbers {
            margin-top: 40px;
            padding: 25px;
            background: linear-gradient(135deg, #667eea05 0%, #764ba205 100%);
            border-radius: 15px;
        }

        .next-numbers h4 {
            color: #1e293b;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .number-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: white;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }

        .number-category {
            font-weight: 600;
            color: #1e293b;
        }

        .number-value {
            font-weight: 700;
            color: #4f46e5;
            font-size: 1.1rem;
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 8px;
            background: #f1f5f9;
            color: #64748b;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-icon:hover {
            background: #e2e8f0;
            color: #1e293b;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
        }

        @media (max-width: 768px) {
            .upload-card {
                padding: 25px;
            }
            
            .numbers-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="upload-container">
        <div class="upload-header">
            <button class="back-btn" id="backBtn">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1>Upload Document</h1>
        </div>
        
        <div class="upload-card">
            <!-- Alert Container -->
            <div id="alertContainer"></div>
            
            <!-- File Upload Area -->
            <div class="upload-area" id="uploadArea">
                <i class="fas fa-cloud-upload-alt"></i>
                <h3>Drag & Drop PDF File</h3>
                <p>or click to browse</p>
                <p style="font-size: 0.85rem; color: #94a3b8;">Maximum file size: 100MB</p>
                <input type="file" id="fileInput" accept=".pdf" style="display: none;">
                <div class="file-info" id="fileInfo">
                    <i class="fas fa-file-pdf" style="font-size: 1.5rem; color: #ef4444; margin-right: 10px;"></i>
                    <span id="fileName"></span>
                    <span id="fileSize" style="margin-left: 10px; color: #64748b;"></span>
                </div>
            </div>
            
            <!-- File Number Preview -->
            <div class="file-number-preview" id="fileNumberPreview" style="display: none;">
                <h4><i class="fas fa-hashtag"></i> Assigned File Number</h4>
                <div class="preview-item">
                    <span class="preview-label">Category:</span>
                    <span class="preview-value" id="previewCategory"></span>
                </div>
                <div class="preview-item">
                    <span class="preview-label">File Number:</span>
                    <span class="preview-value" id="previewFileNumber"></span>
                </div>
            </div>
            
            <!-- Upload Form -->
            <form id="uploadForm">
                <div class="form-group">
                    <label for="category">
                        <i class="fas fa-tag"></i>
                        Document Category
                    </label>
                    <select id="category" name="category" required>
                        <option value="">Select a category</option>
                        <option value="Letters">Letters (LR)</option>
                        <option value="Certificates">Certificates (CR)</option>
                        <option value="Test Reports">Test Reports (TR)</option>
                        <option value="Component Reports">Component Reports (STR)</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="description">
                        <i class="fas fa-align-left"></i>
                        Description (Optional)
                    </label>
                    <textarea id="description" name="description" rows="4" placeholder="Enter file description..."></textarea>
                </div>
                
                <!-- Upload Progress -->
                <div class="upload-progress" id="uploadProgress">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-text" id="progressText">0% Uploaded</div>
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">
                        <i class="fas fa-times"></i>
                        Cancel
                    </button>
                    <button type="submit" class="btn btn-primary" id="submitBtn" disabled>
                        <i class="fas fa-cloud-upload-alt"></i>
                        Upload Document
                    </button>
                </div>
            </form>
            
            <!-- Next Numbers Preview -->
            <div class="next-numbers" id="nextNumbers">
                <h4><i class="fas fa-arrow-right"></i> Next Available Numbers</h4>
                <div class="numbers-grid" id="nextNumbersGrid">
                    <!-- Will be populated dynamically -->
                </div>
            </div>
        </div>
    </div>

    <script src="js/util.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/upload.js"></script>
</body>
</html>
